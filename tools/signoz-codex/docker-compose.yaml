
x-common: &common
  networks:
    - signoz-net
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: "3"

x-clickhouse-defaults: &clickhouse-defaults
  !!merge <<: *common
  image: clickhouse/clickhouse-server:25.5.6
  tty: true
  labels:
    signoz.io/scrape: "true"
    signoz.io/port: "9363"
    signoz.io/path: "/metrics"
  depends_on:
    init-clickhouse:
      condition: service_completed_successfully
    zookeeper-1:
      condition: service_healthy
  healthcheck:
    test:
      - CMD
      - wget
      - --spider
      - -q
      - 0.0.0.0:8123/ping
    interval: 30s
    timeout: 5s
    retries: 3
  ulimits:
    nproc: 65535
    nofile:
      soft: 262144
      hard: 262144
  environment:
    - CLICKHOUSE_SKIP_USER_SETUP=1

x-zookeeper-defaults: &zookeeper-defaults
  !!merge <<: *common
  image: signoz/zookeeper:3.7.1
  user: root
  labels:
    signoz.io/scrape: "true"
    signoz.io/port: "9141"
    signoz.io/path: "/metrics"
  healthcheck:
    test:
      - CMD-SHELL
      - curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null
    interval: 30s
    timeout: 5s
    retries: 3

x-db-depend: &db-depend
  !!merge <<: *common
  depends_on:
    clickhouse:
      condition: service_healthy
    schema-migrator-sync:
      condition: service_completed_successfully

services:
  init-clickhouse:
    !!merge <<: *common
    image: clickhouse/clickhouse-server:25.5.6
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        if [ -f /var/lib/clickhouse/user_scripts/histogramQuantile ]; then
          echo "histogram-binary already exists, skipping download"
          exit 0
        fi
        version="v0.0.1"
        checksum_file="/etc/clickhouse-histogram-quantile.sha256"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m)
        case "$${node_arch}" in
          aarch64|arm64) node_arch="arm64" ;;
          x86_64|amd64) node_arch="amd64" ;;
          *)
            echo "Unsupported histogram-quantile architecture: $${node_arch}" >&2
            exit 1
            ;;
        esac
        asset_name="histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        asset_url="https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/$${asset_name}"
        expected_checksum=$$(awk '$$2 == asset {print $$1}' asset="$${asset_name}" "$${checksum_file}")
        if [ -z "$${expected_checksum}" ]; then
          echo "Missing checksum for $${asset_name} in $${checksum_file}" >&2
          exit 1
        fi
        workdir="/var/lib/clickhouse/user_scripts/.histogram-download"
        rm -rf "$${workdir}"
        mkdir -p "$${workdir}"
        trap 'rm -rf "$${workdir}"' EXIT
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd "$${workdir}"
        wget -O "$${asset_name}" "$${asset_url}"
        printf '%s  %s\n' "$${expected_checksum}" "$${asset_name}" | sha256sum -c -
        tar -xvzf "$${asset_name}"
        install -m 0755 histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - "${SIGNOZ_CODEX_CLICKHOUSE_USER_SCRIPTS:-./common/clickhouse/user_scripts}:/var/lib/clickhouse/user_scripts/"
      - "${SIGNOZ_CODEX_CLICKHOUSE_HISTOGRAM_SHA256:-./common/clickhouse/histogram-quantile.sha256}:/etc/clickhouse-histogram-quantile.sha256:ro"

  zookeeper-1:
    !!merge <<: *zookeeper-defaults
    volumes:
      - zookeeper-1:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141

  clickhouse:
    !!merge <<: *clickhouse-defaults
    volumes:
      - "${SIGNOZ_CODEX_CLICKHOUSE_CONFIG:-./common/clickhouse/config.xml}:/etc/clickhouse-server/config.xml"
      - "${SIGNOZ_CODEX_CLICKHOUSE_USERS:-./common/clickhouse/users.xml}:/etc/clickhouse-server/users.xml"
      - "${SIGNOZ_CODEX_CLICKHOUSE_CUSTOM_FUNCTION:-./common/clickhouse/custom-function.xml}:/etc/clickhouse-server/custom-function.xml"
      - "${SIGNOZ_CODEX_CLICKHOUSE_USER_SCRIPTS:-./common/clickhouse/user_scripts}:/var/lib/clickhouse/user_scripts/"
      - "${SIGNOZ_CODEX_CLICKHOUSE_CLUSTER:-./common/clickhouse/cluster.xml}:/etc/clickhouse-server/config.d/cluster.xml"
      - clickhouse:/var/lib/clickhouse/

  signoz:
    !!merge <<: *db-depend
    image: signoz/signoz:${VERSION:-v0.110.1}
    command:
      - --config=/root/config/prometheus.yml
    ports:
      - "${SIGNOZ_CODEX_BIND_ADDR:-127.0.0.1}:8105:8080"
    volumes:
      - "${SIGNOZ_CODEX_SIGNOZ_PROMETHEUS:-./common/signoz/prometheus.yml}:/root/config/prometheus.yml"
      - "${SIGNOZ_CODEX_SIGNOZ_COMMON:-./common/signoz}:/root/config/signoz-common"
      - sqlite:/var/lib/signoz/
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - STORAGE=clickhouse
      - GODEBUG=netdns=go
      - TELEMETRY_ENABLED=false
      - DEPLOYMENT_TYPE=docker-standalone-amd
      - DOT_METRICS_ENABLED=true
      - SIGNOZ_GOOGLE_OAUTH_ENABLED=false
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - localhost:8080/api/v1/health
      interval: 30s
      timeout: 5s
      retries: 3

  otel-collector:
    !!merge <<: *db-depend
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.129.13}
    command:
      - --config=/etc/otel-collector-config.yaml
      - --feature-gates=-pkg.translator.prometheus.NormalizeName
    volumes:
      - "${SIGNOZ_CODEX_OTEL_COLLECTOR_CONFIG:-./otel-collector-config.yaml}:/etc/otel-collector-config.yaml"
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-codex-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
    ports:
      - "${SIGNOZ_CODEX_BIND_ADDR:-127.0.0.1}:5317:4317"
      - "${SIGNOZ_CODEX_BIND_ADDR:-127.0.0.1}:5318:4318"
    depends_on:
      signoz:
        condition: service_healthy

  schema-migrator-sync:
    !!merge <<: *common
    image: signoz/signoz-schema-migrator:${OTELCOL_TAG:-v0.129.13}
    command:
      - sync
      - --dsn=tcp://clickhouse:9000
      - --up=
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: on-failure

  schema-migrator-async:
    !!merge <<: *db-depend
    image: signoz/signoz-schema-migrator:${OTELCOL_TAG:-v0.129.13}
    command:
      - async
      - --dsn=tcp://clickhouse:9000
      - --up=
    restart: on-failure

networks:
  signoz-net: {}

volumes:
  clickhouse: {}
  sqlite: {}
  zookeeper-1: {}
