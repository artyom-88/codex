# Codex OpenTelemetry settings for the local SigNoz Codex stack.
# Merge the safe parts you want into ~/.codex/config.toml.
# These endpoints point to the advertised SigNoz stack host. For local Docker and
# minikube setups with localhost forwarding, they usually stay on localhost.
# With log_user_prompt = false, codex.user_prompt events still exist but the prompt value is redacted.
# Set it to true only if you explicitly want raw prompt text in SigNoz logs.
# Project metadata is expected to come from OTEL_RESOURCE_ATTRIBUTES in your shell,
# not from extra fields in this config file.

[otel]
log_user_prompt = false
environment = "dev"
exporter = { otlp-grpc = { endpoint = "http://localhost:5317" } }
trace_exporter = { otlp-grpc = { endpoint = "http://localhost:5317" } }
metrics_exporter = { otlp-grpc = { endpoint = "http://localhost:5317" } }
