name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-quality:
    name: Python Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pylint
        run: python -m pip install --disable-pip-version-check pylint==3.0.2

      - name: Run pylint
        env:
          PYLINTHOME: ${{ runner.temp }}/pylint
        run: |
          mapfile -t python_files < <(git ls-files '*.py')
          if [ "${#python_files[@]}" -eq 0 ]; then
            echo "No tracked Python files to lint."
            exit 0
          fi
          pylint --rcfile .pylintrc "${python_files[@]}"

  python-security:
    name: Python Security
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install bandit
        run: python -m pip install --disable-pip-version-check bandit==1.9.4

      - name: Run bandit
        run: |
          mapfile -t python_files < <(git ls-files '*.py')
          if [ "${#python_files[@]}" -eq 0 ]; then
            echo "No tracked Python files to scan."
            exit 0
          fi
          bandit -q "${python_files[@]}"
